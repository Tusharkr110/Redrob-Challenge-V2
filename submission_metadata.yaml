ai_usage_summary: |
  Used ChatGPT for architecture discussion, debugging, feature engineering ideas,
  repository organization, and documentation. No candidate ranking was performed
  using external APIs. The final ranking runs locally on CPU without network access.

methodology_summary: |
  Built a rule-based candidate ranking system focused on AI/ML hiring signals.
  Candidates are scored using experience, current title, career consistency,
  retrieval and ranking related skills, vector database experience, production ML
  indicators, and behavioral signals. Additional penalties are applied to
  suspicious profiles and non-relevant career paths. The final output ranks the
  top 100 candidates and generates candidate-specific reasoning for each ranking.
  The solution runs locally on CPU within the competition constraints.

